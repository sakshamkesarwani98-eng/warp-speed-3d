<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Turbo Racing - Live</title>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', Courier, monospace; color: white; }
        
        /* ID-01: Global Fullscreen Button */
        #fullscreen-btn { position: absolute; top: 15px; right: 15px; z-index: 9999; padding: 10px 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; }
        #fullscreen-btn:hover { background: white; color: black; }

        /* ID-11: New Hub UI */
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 100; text-align: center; }
        .active { display: flex; }
        
        .menu-btn { padding: 15px 30px; margin: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 8px; width: 280px; text-transform: uppercase; transition: transform 0.2s, background 0.2s; }
        .menu-btn:hover { background: #ff6b81; transform: scale(1.05); }
        .menu-btn:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }
        
        input[type="text"] { padding: 15px; font-size: 1.2rem; text-align: center; border-radius: 8px; border: 2px solid #555; margin-bottom: 20px; outline: none; background: #222; color: white; }

        /* Mobile Controls */
        #mobile-controls { display: none; position: absolute; bottom: 20px; width: 100%; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        .control-btn { width: 70px; height: 70px; background: rgba(255, 71, 87, 0.5); border-radius: 50%; border: 2px solid white; color: white; font-size: 24px; user-select: none; }
        .nitro-btn { background: rgba(52, 152, 219, 0.7); width: 80px; height: 80px; }

        /* ID-04 & 06: Trophy & End Screen */
        #trophy-display { font-size: 120px; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); }
        #rank-label { font-size: 3rem; margin: 0; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>

    <div id="login-screen" class="screen active">
        <h1 style="color: #ffa502; font-size: 3rem; text-shadow: 0 0 10px #ffa502;">3D TURBO RACING</h1>
        <input type="text" id="username-input" placeholder="ENTER HANDLE (LETTERS ONLY)" maxlength="12" oninput="this.value = this.value.replace(/[^a-zA-Z]/g, '').toUpperCase()">
        <button id="login-btn" class="menu-btn">CLAIM HANDLE & ENTER</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 style="color: #2ed573;">THE HUB</h2>
        <p id="player-greeting">Welcome, RACER</p>
        
        <button id="quick-race-btn" class="menu-btn">QUICK RACE (PUBLIC)</button>
        <button id="host-btn" class="menu-btn">HOST PRIVATE ROOM</button>
        
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #555;">
            <input type="text" id="room-code-input" placeholder="ROOM CODE" maxlength="6" style="width: 250px;">
            <br>
            <button id="join-btn" class="menu-btn">JOIN PRIVATE ROOM</button>
        </div>
        <p id="hub-status" style="margin-top: 15px; color: #ffa502; font-weight: bold;"></p>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>LOBBY: <span id="room-id-display"></span></h2>
        <p>Players in room: <span id="player-count">1</span>/4</p>
        <ul id="player-list" style="list-style: none; padding: 0; font-size: 1.5rem;"></ul>
        <button id="start-race-btn" class="menu-btn" style="display: none; background: #2ed573;">START ENGINE</button>
        <button class="menu-btn" style="background: #555;" onclick="location.reload()">LEAVE</button>
    </div>

    <div id="end-screen" class="screen">
        <div id="trophy-display">🏆</div>
        <h1 id="rank-label">1ST PLACE</h1>
        <button class="menu-btn" style="margin-top: 30px;" onclick="location.reload()">BACK TO HUB</button>
    </div>

    <div id="mobile-controls">
        <div>
            <button class="control-btn" id="btn-left">◀</button>
            <button class="control-btn" id="btn-right">▶</button>
        </div>
        <div>
            <button class="control-btn" id="btn-gas">▲</button>
            <button class="control-btn nitro-btn" id="btn-nitro">🚀</button>
            <button class="control-btn" id="btn-brake">▼</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, limit, getDocs, addDoc, updateDoc, doc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🚨 PASTE YOUR FIREBASE CONFIG HERE 🚨
        const firebaseConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "YOUR_DOMAIN",
            // projectId: "YOUR_PROJECT_ID",
            // ...
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GLOBAL STATE ---
        let myUsername = "";
        let isHost = false;
        let keys = { w: false, a: false, s: false, d: false, Shift: false, manual_gas: false };

        // --- ID-01: FULLSCREEN LOGIC ---
        window.toggleFullscreen = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        };

        // --- UI NAVIGATION ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- LOGIN LOGIC ---
        document.getElementById('login-btn').addEventListener('click', () => {
            const input = document.getElementById('username-input').value;
            if (input.length < 3) {
                alert("Name must be at least 3 letters!");
                return;
            }
            myUsername = input;
            document.getElementById('player-greeting').innerText = `Welcome, ${myUsername}`;
            switchScreen('hub-screen');
            checkMobile();
        });

        function checkMobile() {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                document.getElementById('mobile-controls').style.display = 'flex';
                setupMobileControls();
            }
        }

        // --- ID-09: MOBILE NITRO AUTO-GAS ---
        function setupMobileControls() {
            const gasBtn = document.getElementById('btn-gas');
            const nitroBtn = document.getElementById('btn-nitro');

            // Regular Gas
            gasBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.w = true; keys.manual_gas = true; });
            gasBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.manual_gas = false; if(!keys.Shift) keys.w = false; });

            // Nitro + Auto Gas combo
            nitroBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.Shift = true;
                keys.w = true; // Automatically apply gas
            });
            nitroBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.Shift = false;
                if (!keys.manual_gas) keys.w = false; // Only stop gas if standard gas isn't held
            });
        }

        // --- ID-10: QUICK RACE MATCHMAKING ---
        document.getElementById('quick-race-btn').addEventListener('click', async (e) => {
            // ID-02: Prevent Double-Join Glitch
            const btn = e.target;
            btn.disabled = true;
            document.getElementById('hub-status').innerText = "SEARCHING THE GRID...";

            try {
                const matchRef = collection(db, "matchmaking");
                const q = query(matchRef, where("status", "==", "open"), where("type", "==", "public"), where("playerCount", "<", 4), limit(1));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    const roomDoc = snapshot.docs[0];
                    await updateDoc(doc(db, "matchmaking", roomDoc.id), { playerCount: increment(1) });
                    joinLobby(roomDoc.data().peerId, false);
                } else {
                    const newRoomID = Math.random().toString(36).substring(2, 8).toUpperCase();
                    await addDoc(matchRef, { peerId: newRoomID, status: "open", type: "public", playerCount: 1 });
                    joinLobby(newRoomID, true);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('hub-status').innerText = "COULD NOT CONNECT TO DATABASE.";
                btn.disabled = false;
            }
        });

        // --- HOST / JOIN PRIVATE ROOMS ---
        document.getElementById('host-btn').addEventListener('click', () => {
            const newRoomID = Math.random().toString(36).substring(2, 8).toUpperCase();
            // Note: We skip adding private rooms to the "matchmaking" public database collection
            joinLobby(newRoomID, true);
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            const code = document.getElementById('room-code-input').value.toUpperCase();
            if (code.length > 3) joinLobby(code, false);
        });

        function joinLobby(roomId, isCreating) {
            isHost = isCreating;
            document.getElementById('room-id-display').innerText = roomId;
            switchScreen('lobby-screen');
            
            // ID-08: Host Only Start Button
            if (isHost) {
                document.getElementById('start-race-btn').style.display = 'block';
            }
        }

        // --- ID-03, 04, 05, 06: RACE END LOGIC ---
        // Call this function when a player crosses the finish line
        window.triggerRaceEnd = (rank, totalPlayers) => {
            switchScreen('end-screen');
            const rankLabel = document.getElementById('rank-label');
            const trophy = document.getElementById('trophy-display');

            if (rank === 1) {
                rankLabel.innerText = "1ST PLACE - CHAMPION";
                trophy.innerText = "🏆";
                shootConfetti();
            } else if (rank <= 3) {
                rankLabel.innerText = `${rank}${rank === 2 ? 'ND' : 'RD'} PLACE`;
                trophy.innerText = rank === 2 ? "🥈" : "🥉";
                shootConfetti();
            } else if (rank === totalPlayers && totalPlayers > 1) {
                rankLabel.innerText = "YOU LOST";
                rankLabel.style.color = "#ff4757";
                trophy.innerText = "💀";
            } else {
                rankLabel.innerText = `${rank}TH PLACE`;
                trophy.innerText = "🏁";
            }
        };

        // ID-05: Party Popper Effect
        function shootConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4757', '#2ed573', '#ffa502']
                });
                confetti({
                    particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4757', '#2ed573', '#ffa502']
                });

                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // [Your Three.js Canvas setup and PeerJS network sync loop will plug in below here]
        
    </script>
</body>
</html>
