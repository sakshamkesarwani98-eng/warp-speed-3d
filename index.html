<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Turbo Racing - Live</title>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', Courier, monospace; color: white; }
        
        #fullscreen-btn { position: absolute; top: 15px; right: 15px; z-index: 9999; padding: 10px 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 100; text-align: center; }
        .active { display: flex; }
        
        .menu-btn { padding: 15px 30px; margin: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 8px; width: 280px; text-transform: uppercase; transition: transform 0.2s; }
        .menu-btn:hover { background: #ff6b81; transform: scale(1.05); }
        .google-btn { background: #4285F4; }
        .google-btn:hover { background: #5a95f5; }
        
        input[type="text"] { padding: 15px; font-size: 1.2rem; text-align: center; border-radius: 8px; border: 2px solid #555; margin-bottom: 20px; outline: none; background: #222; color: white; }

        #mobile-controls { display: none; position: absolute; bottom: 20px; width: 100%; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        .control-btn { width: 70px; height: 70px; background: rgba(255, 71, 87, 0.5); border-radius: 50%; border: 2px solid white; color: white; font-size: 24px; }
        .nitro-btn { background: rgba(52, 152, 219, 0.7); width: 80px; height: 80px; }

        #trophy-display { font-size: 120px; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); }
        #rank-label { font-size: 3rem; margin: 0; }
    </style>
</head>
<body>

    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>

    <div id="login-screen" class="screen active">
        <h1 style="color: #ffa502; font-size: 3rem;">3D TURBO RACING</h1>
        <button id="google-login-btn" class="menu-btn google-btn">CONTINUE WITH GOOGLE</button>
        <button id="guest-login-btn" class="menu-btn">PLAY AS GUEST</button>
        <p id="login-status" style="margin-top: 15px;"></p>
    </div>

    <div id="username-screen" class="screen">
        <h2>CLAIM YOUR HANDLE</h2>
        <input type="text" id="username-input" placeholder="LETTERS ONLY" maxlength="12" oninput="this.value = this.value.replace(/[^a-zA-Z]/g, '').toUpperCase()">
        <button id="claim-btn" class="menu-btn">ENTER HUB</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 style="color: #2ed573;">THE HUB</h2>
        <p id="player-greeting">Welcome, RACER</p>
        <button id="quick-race-btn" class="menu-btn">QUICK RACE (PUBLIC)</button>
        <button id="host-btn" class="menu-btn">HOST PRIVATE ROOM</button>
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #555;">
            <input type="text" id="room-code-input" placeholder="ROOM CODE" maxlength="6" style="width: 250px;">
            <br>
            <button id="join-btn" class="menu-btn">JOIN PRIVATE ROOM</button>
        </div>
        <p id="hub-status"></p>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>LOBBY: <span id="room-id-display"></span></h2>
        <ul id="player-list"></ul>
        <button id="start-race-btn" class="menu-btn" style="display: none; background: #2ed573;">START ENGINE</button>
    </div>

    <div id="end-screen" class="screen">
        <div id="trophy-display">🏆</div>
        <h1 id="rank-label">1ST PLACE</h1>
        <button class="menu-btn" onclick="location.reload()">BACK TO HUB</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // RESTORED AUTH IMPORTS
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, limit, getDocs, addDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🚨 PASTE YOUR FIREBASE CONFIG HERE 🚨
        const firebaseConfig = {
            // YOUR CONFIG HERE
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myUsername = "";
        let isHost = false;
        let keys = { w: false, Shift: false, manual_gas: false };

        window.toggleFullscreen = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- AUTHENTICATION LOGIC RESTORED ---
        const provider = new GoogleAuthProvider();

        document.getElementById('google-login-btn').addEventListener('click', () => {
            document.getElementById('login-status').innerText = "Connecting to Google...";
            signInWithPopup(auth, provider).catch(err => document.getElementById('login-status').innerText = err.message);
        });

        document.getElementById('guest-login-btn').addEventListener('click', () => {
            document.getElementById('login-status').innerText = "Connecting as Guest...";
            signInAnonymously(auth).catch(err => document.getElementById('login-status').innerText = err.message);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Check if they already have a username in Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    myUsername = userDoc.data().username;
                    document.getElementById('player-greeting').innerText = `Welcome, ${myUsername}`;
                    switchScreen('hub-screen');
                } else {
                    switchScreen('username-screen');
                }
            } else {
                switchScreen('login-screen');
            }
        });

        document.getElementById('claim-btn').addEventListener('click', async () => {
            const input = document.getElementById('username-input').value;
            if (input.length < 3) return alert("Name must be at least 3 letters!");
            
            const user = auth.currentUser;
            if (user) {
                await setDoc(doc(db, "users", user.uid), { username: input, wins: 0 });
                myUsername = input;
                document.getElementById('player-greeting').innerText = `Welcome, ${myUsername}`;
                switchScreen('hub-screen');
            }
        });

        // --- ID-10: MATCHMAKING LOGIC ---
        document.getElementById('quick-race-btn').addEventListener('click', async (e) => {
            e.target.disabled = true; // No Double Join
            document.getElementById('hub-status').innerText = "SEARCHING THE GRID...";
            try {
                const matchRef = collection(db, "matchmaking");
                const q = query(matchRef, where("status", "==", "open"), limit(1));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    const roomDoc = snapshot.docs[0];
                    await updateDoc(doc(db, "matchmaking", roomDoc.id), { playerCount: increment(1) });
                    joinLobby(roomDoc.data().peerId, false);
                } else {
                    const newRoomID = Math.random().toString(36).substring(2, 8).toUpperCase();
                    await addDoc(matchRef, { peerId: newRoomID, status: "open", type: "public", playerCount: 1 });
                    joinLobby(newRoomID, true);
                }
            } catch (err) { console.error(err); }
        });

        // [Rest of Lobby, Private Room, Mobile Nitro, and Confetti Logic goes here...]
    </script>
</body>
</html>
