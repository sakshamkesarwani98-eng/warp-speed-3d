    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDppG77Saed8i49ZzeTlgougqRfYwV0D4s",
            authDomain: "warpspeed3d-771b7.firebaseapp.com",
            projectId: "warpspeed3d-771b7",
            storageBucket: "warpspeed3d-771b7.firebasestorage.app",
            messagingSenderId: "468140398821",
            appId: "1:468140398821:web:3ef49e7332cbfd1fe9dc0c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // Global State Variables for Block 2 to access
        window.playerName = "";
        window.userUID = "";
        window.lobbyPlayers = []; 
        window.countdownTimer = null;
        window.gameState = 'AUTH'; // STRICT STATE-GATING
        window.isHost = false;
        window.isPrivateRoom = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.userUID = user.uid;
                if (user.isAnonymous) {
                    let savedName = localStorage.getItem('warpspeed_guest_name');
                    if (!savedName) {
                        savedName = "GUEST_" + Math.floor(1000 + Math.random() * 9000);
                        localStorage.setItem('warpspeed_guest_name', savedName);
                    }
                    window.playerName = savedName;
                    updateHUDName();
                    window.showScreen('screen-menu');
                } else {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().username) {
                        window.playerName = userDoc.data().username;
                        updateHUDName();
                        window.showScreen('screen-menu');
                    } else {
                        window.showScreen('screen-username-gate');
                    }
                }
            } else {
                window.showScreen('screen-auth-main');
            }
        });

        window.claimUsername = async () => {
            const inputName = document.getElementById('gate-name-input').value.trim().toUpperCase();
            const errDiv = document.getElementById('gate-err');
            if (!/^[A-Z]+$/.test(inputName)) { errDiv.innerText = "LETTERS A-Z ONLY."; return; }
            if (inputName.length < 3 || inputName.length > 12) { errDiv.innerText = "NAME MUST BE 3-12 CHARACTERS"; return; }
            try {
                await runTransaction(db, async (transaction) => {
                    const nameRef = doc(db, "usernames", inputName);
                    if ((await transaction.get(nameRef)).exists()) throw "NAME TAKEN. TRY ANOTHER.";
                    transaction.set(nameRef, { uid: window.userUID });
                    transaction.set(doc(db, "users", window.userUID), { username: inputName });
                });
                window.playerName = inputName; updateHUDName(); window.showScreen('screen-menu');
            } catch (e) { errDiv.innerText = e; }
        };

        // THE IRON FUNNEL MATCHMAKING
        window.isSearchingQuickRace = false;
        window.findQuickRace = async () => {
            if (window.isSearchingQuickRace) return;
            window.isSearchingQuickRace = true;
            const btn = document.querySelector('#screen-menu .btn-main');
            btn.innerText = "SEARCHING..."; btn.disabled = true;
            
            // Randomized stagger to aggressively prevent dual room creation
            await new Promise(r => setTimeout(r, 1500 + Math.random() * 1000));

            let attempts = 0, success = false, targetCode = null, isCreating = false;

            while (attempts < 3 && !success) {
                try {
                    const publicRef = doc(db, "matchmaking", "LATEST_PUBLIC");
                    await runTransaction(db, async (transaction) => {
                        const snap = await transaction.get(publicRef);
                        let now = Date.now();
                        // Verify room is open, has space, and heartbeat is fresh (30s)
                        if (snap.exists() && snap.data().status === "LOBBY" && snap.data().playerCount < 10 && (now - snap.data().timestamp < 30000)) {
                            targetCode = snap.data().code;
                            window.activeTrack = snap.data().trackId || 0;
                            transaction.update(publicRef, { playerCount: snap.data().playerCount + 1, timestamp: now });
                        } else {
                            targetCode = "PUB" + Math.random().toString(36).substring(2,6).toUpperCase();
                            isCreating = true;
                            window.activeTrack = Math.floor(Math.random() * TRACKS.length);
                            transaction.set(publicRef, { code: targetCode, timestamp: now, playerCount: 1, status: "LOBBY", trackId: window.activeTrack });
                        }
                    });
                    success = true;
                } catch (e) { 
                    attempts++; 
                    await new Promise(r => setTimeout(r, 600)); // Retry throttle
                }
            }
            
            btn.innerText = "⚡ QUICK RACE"; btn.disabled = false; window.isSearchingQuickRace = false;
            
            if (success) {
                if (isCreating) window.hostRoom(targetCode, false);
                else { document.getElementById('join-code-input').value = targetCode; window.joinRoom(targetCode, false, true); }
            } else {
                alert("MATCHMAKING BUSY. PLEASE TRY AGAIN.");
            }
        };

        window.doGuest = () => signInAnonymously(auth);
        window.doGoogle = () => signInWithPopup(auth, googleProvider);
        window.doLogout = () => signOut(auth);
        function updateHUDName() { document.getElementById('hud-player-name').innerText = "RACER: " + window.playerName; }
    </script>

        /* Lobby Grid & Status */
        #lobby-grid { width: 90%; max-width: 600px; background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 10px; padding: 20px; margin: 20px 0; max-height: 40vh; overflow-y: auto;}

        #btn-nitro { width: 75px; height: 65px; background: rgba(0, 240, 255, 0.2); border-color: #0ff; font-size: 1rem; margin-right: 85px;}
        
        /* UI Overlays */
        #countdown-ui { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 12rem; z-index: 25; font-weight: bold; pointer-events: none; text-shadow: 8px 8px 0 rgba(0,0,0,0.5); color: #fff; text-align: center; }

    let hostPingInterval = null, clientPingInterval = null, autoStartInterval = null, autoStartSeconds = 30, ignitionLocked = false;

            } else { p1.glitchInverted = false; }

            if(leftPressed) p1.lane -= steerSpeed * dt;
            if(rightPressed) p1.lane += steerSpeed * dt;
            p1.lane = Math.max(-0.2, Math.min(2.2, p1.lane)); p1.camLane += (p1.lane - p1.camLane) * 8 * dt; 

            p1.isBraking = keys['KeyS'] || keys['ArrowDown']; let gasPressed = keys['KeyW'] || keys['ArrowUp'];
            
            if (crossTriggered) {
                p1.speed = 0;
                p1.turboActive = false;
            } else if (p1.isBraking) {

            } else {
                if (keys['ShiftLeft'] && p1.speed > 80 && p1.nitro > 0) { if (!p1.turboActive && p1.nitro > 20) p1.turboActive = true; } else p1.turboActive = false;
                if (p1.turboActive) { p1.nitro -= 16.5 * dt; if (p1.nitro <= 0) { p1.nitro = 0; p1.turboActive = false; } } else if (p1.nitro < 100) p1.nitro += 15 * dt;
                let topSpeed = p1.turboActive ? 640 : 360;
                let activeTrackData = TRACKS[window.activeTrack];
                
                // PROJECT X: BREAK THE LIMITER
                if (activeTrackData && activeTrackData.isSecret) {
                    topSpeed = p1.turboActive ? 1400 : 800; // Double speed!
                    p1.nitro = 100; // Infinite Nitro
                }
                if (activeTrackData && activeTrackData.isVolcano) {
                    if (gasPressed && !crossTriggered) p1.heat += 12 * dt;
                    if (p1.isBraking) p1.heat -= 80 * dt;
                    if (!gasPressed && !p1.isBraking) p1.heat -= 25 * dt;
                    p1.heat = Math.max(0, Math.min(100, p1.heat));
                    if (p1.heat > 90) topSpeed = 200; // Engine Overheat Penalty
                }
                
                let accelRate = (activeTrackData && activeTrackData.isAbyss) ? 150 : 300; 
                let friction = (activeTrackData && activeTrackData.isAbyss) ? 120 : 80;

                if (gasPressed) {
                    if (p1.speed <= topSpeed) p1.speed = Math.min(topSpeed, p1.speed + accelRate * dt);
                    else p1.speed = Math.max(topSpeed, p1.speed - 150 * dt);
                } else p1.speed = Math.max(0, p1.speed - friction * dt);
            }
            
            let prevDist = p1.dist;
            if (!crossTriggered) {
                p1.dist += (p1.speed * 0.277 * 4.0) * dt; 
                let activeTrackData = TRACKS[window.activeTrack];
                if (activeTrackData && activeTrackData.hasBoost) {
                    let padSpacing = 2000;
                    if (Math.floor(p1.dist / padSpacing) > Math.floor(prevDist / padSpacing) && p1.dist < TOTAL_DIST) {
                        p1.speed = 900; p1.nitro = 100;
                    }
                }
            }

            traffic.forEach(t => {
                if(window.isHost) { 
                    if (t.type === 'asteroid') {
                        let leadDist = p1.dist; clients.forEach(c => { if (!c.dead && c.dist > leadDist) leadDist = c.dist; });
                        if (t.state === 0 && (t.d - leadDist) < 1200 && (t.d - leadDist) > 0) t.state = 1; 
                        if (t.state === 1) { t.y -= 3500 * dt; if (t.y <= 0) { t.y = 0; t.state = 2; } }
                    } else if (t.type === 'magma') {
                        let leadDist = p1.dist; clients.forEach(c => { if (!c.dead && c.dist > leadDist) leadDist = c.dist; });
                        if (t.state === 0 && (t.d - leadDist) < 800 && (t.d - leadDist) > 0) t.state = 1;
                        if (t.state === 1) { t.y += 2000 * dt; if (t.y >= 0) { t.y = 0; t.state = 2; } }
                    } else if (t.type !== 'puddle') {
                        // DOPPELGANGER AI: Mirror the player's lane and go slightly faster
                        if (t.type === 'doppelganger') {
                            t.l += (p1.lane - t.l) * 4 * dt; 
                            t.s = p1.speed + 50; 
                        }
                        
                        t.d += ((t.s * 0.277 * 4.0) * dt); 
                        let carAhead = traffic.find(other => other.l === t.l && other.d > t.d && (other.d - t.d) < 250 && other.type !== 'asteroid' && other.type !== 'magma' && other.type !== 'puddle'); 
                        if (carAhead && t.s > carAhead.s) t.s = Math.max(0, t.s - 100 * dt);

                            p1.heat = Math.min(100, p1.heat + 50 * dt);
                        } else if (t.type !== 'phantom') { // Phantoms are harmless holograms!
                            let isDangerous = (t.type !== 'asteroid' && t.type !== 'magma') || (t.type === 'asteroid' && t.y < 50) || (t.type === 'magma' && t.y > -150);
                            if (isDangerous) localWreck();
                        }
                    }
                }
            });

            if(p1.dist >= TOTAL_DIST && !p1.dead && !crossTriggered) {
                window.flashOpacity = 1.0; // Attach to window so it never crashes
                crossTriggered = true; p1.speed = 0; p1.dist = TOTAL_DIST; p1.finishTime = performance.now();
                if (window.isHost) triggerGlobalFinish();

        }

        let nitroFill = document.getElementById('nitro-fill'); nitroFill.style.width = p1.nitro + "%";

            if (p1.heat > 90) { heatFill.style.background = (Math.floor(performance.now()/100)%2===0) ? "#ffffff" : "#ff0000"; p1.nitro = Math.max(0, p1.nitro - 50 * dt); } 
            else heatFill.style.background = "linear-gradient(90deg, #ffaa00, #ff0000)";
        }

        if(!p1.dead && !crossTriggered) { document.getElementById('hud-speed').innerText = Math.floor(p1.speed); document.getElementById('hud-dist').innerText = Math.floor(p1.dist); }
        updateProgressBar();

        netTimer += dt;
        if(netTimer > 0.05) {
            if(window.isHost) {
                let safeClients = clients.map(c => ({ id: c.id, name: c.name, dist: c.dist, lane: c.lane, speed: c.speed, dead: c.dead, isBraking: c.isBraking, colIdx: c.colIdx, finishTime: c.finishTime }));
                safeClients.push({ id: myPeerId, name: window.playerName, dist: p1.dist, lane: p1.lane, speed: p1.speed, dead: p1.dead, isBraking: p1.isBraking, colIdx: p1.colIdx, finishTime: p1.finishTime }); 
                clients.forEach(c => { try { c.conn.send({type: 'game_sync', clients: safeClients, traffic: traffic}); } catch(e){} }); 
                checkRaceState(); 
            } else { 
                if (hostConnToLobby && hostConnToLobby.open) { try { hostConnToLobby.send({type: 'sync', dist: p1.dist, lane: p1.lane, speed: p1.speed, dead: p1.dead, isBraking: p1.isBraking}); } catch(e){} }

        }
    }

    function draw() {
        let w = canvas.width, h = canvas.height; ctx.save();
        let horizon = h * 0.45; let skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
        let tData = TRACKS[window.activeTrack];
        skyGrad.addColorStop(0, tData.skyTop); skyGrad.addColorStop(1, tData.skyBot); 
        ctx.fillStyle = skyGrad; ctx.fillRect(0,0,w,h);

            for(let i=0; i<60; i++) {

                ctx.fillRect(sx, sy, Math.random() > 0.5 ? 2 : 1, Math.random() > 0.5 ? 2 : 1);
            }
        }
        
        // Render Glitch Screen Tearing
        if (tData.isGlitch && Math.random() < 0.08) {

            ctx.fillRect(0, Math.random() * h, w, Math.random() * 150);

        // Render Abyss Bubbles & Tint
        if (tData.isAbyss) {

            for(let i=0; i<40; i++) {
                let bx = (Math.sin(performance.now()*0.001 + i) * 0.5 + 0.5) * w;
                let by = ((performance.now()*0.1 + i*100) % horizon);
                ctx.beginPath(); ctx.arc(bx, horizon - by, 2, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = "rgba(0, 80, 255, 0.15)";

        }

        ctx.fillStyle = tData.ground; ctx.fillRect(0, horizon, w, h-horizon);
        let viewState = { dist: p1.dist, camLane: p1.camLane, camZoom: p1.camZoom, speed: p1.speed, turbo: p1.turboActive };

            let target = clients.find(c => c.id === window.spectatingId);
            if (target) { viewState.dist = target.dist; viewState.speed = target.speed; viewState.turbo = target.speed > 400; document.getElementById('spec-name').innerText = target.name; document.getElementById('hud-speed').innerText = Math.floor(target.speed); document.getElementById('hud-dist').innerText = Math.floor(target.dist); }
        } else if (p1.dead) document.getElementById('spec-name').innerText = "NO SURVIVORS";

        if (!p1.dead) { let targetZoom = p1.turboActive ? 0.35 : 0.55; p1.camZoom += (targetZoom - p1.camZoom) * 4 * (0.016); viewState.camZoom = p1.camZoom; }
        let focalLength = h * viewState.camZoom;

            let scale = focalLength / (dz + 180); let camX = (viewState.camLane - 1) * 150; 
            return { x: w/2 + (worldX - camX)*scale, y: horizon + (worldY + 120)*scale, s: scale };
        }

        let r1 = project(-300, 0, viewState.dist - 50); let r2 = project(300, 0, viewState.dist - 50); let r3 = project(300, 0, viewState.dist + 3500); let r4 = project(-300, 0, viewState.dist + 3500);
        if(r1 && r3) {
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.moveTo(r1.x, h); ctx.lineTo(r2.x, h); ctx.lineTo(r3.x, horizon); ctx.lineTo(r4.x, horizon); ctx.fill();
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(r1.x, h); ctx.lineTo(r4.x, horizon); ctx.stroke(); ctx.beginPath(); ctx.moveTo(r2.x, h); ctx.lineTo(r3.x, horizon); ctx.stroke();
        }

        let totalCycle = 40; ctx.fillStyle = "#fff";
        for(let z = Math.floor(viewState.dist/totalCycle)*totalCycle; z < viewState.dist + 3500; z += totalCycle) {
            let pL1 = project(-100, 0, z); let pL2 = project(-100, 0, z + 20); let pR1 = project(100, 0, z); let pR2 = project(100, 0, z + 20);
            if (pL1 && pL2 && pL1.y > horizon) { ctx.beginPath(); ctx.moveTo(pL1.x - 2*pL1.s, pL1.y); ctx.lineTo(pL1.x + 2*pL1.s, pL1.y); ctx.lineTo(pL2.x + 2*pL2.s, pL2.y); ctx.lineTo(pL2.x - 2*pL2.s, pL2.y); ctx.fill(); }
            if (pR1 && pR2 && pR1.y > horizon) { ctx.beginPath(); ctx.moveTo(pR1.x - 2*pR1.s, pR1.y); ctx.lineTo(pR1.x + 2*pR1.s, pR1.y); ctx.lineTo(pR2.x + 2*pR2.s, pR2.y); ctx.lineTo(pR2.x - 2*pR2.s, pR2.y); ctx.fill(); }
        }

        function draw3DBox(worldX, worldZ, wSize, hSize, lSize, c, yOff) {
            let fTL = project(worldX - wSize/2, -(hSize + yOff), worldZ + lSize); let fTR = project(worldX + wSize/2, -(hSize + yOff), worldZ + lSize); let fBL = project(worldX - wSize/2, -yOff, worldZ + lSize); let fBR = project(worldX + wSize/2, -yOff, worldZ + lSize);
            let bTL = project(worldX - wSize/2, -(hSize + yOff), worldZ); let bTR = project(worldX + wSize/2, -(hSize + yOff), worldZ); let bBL = project(worldX - wSize/2, -yOff, worldZ); let bBR = project(worldX + wSize/2, -yOff, worldZ);
            if(!fTL || !bTL) return;
            ctx.fillStyle = c.f; ctx.beginPath(); ctx.moveTo(fTL.x, fTL.y); ctx.lineTo(fTR.x, fTR.y); ctx.lineTo(fBR.x, fBR.y); ctx.lineTo(fBL.x, fBL.y); ctx.fill();
            ctx.fillStyle = c.t; ctx.beginPath(); ctx.moveTo(fTL.x, fTL.y); ctx.lineTo(fTR.x, fTR.y); ctx.lineTo(bTR.x, bTR.y); ctx.lineTo(bTL.x, bTL.y); ctx.fill();
            let camX = (viewState.camLane - 1) * 150; ctx.fillStyle = c.s;
            if (worldX > camX) { ctx.beginPath(); ctx.moveTo(fTL.x, fTL.y); ctx.lineTo(fBL.x, fBL.y); ctx.lineTo(bBL.x, bBL.y); ctx.lineTo(bTL.x, bTL.y); ctx.fill(); } else { ctx.beginPath(); ctx.moveTo(fTR.x, fTR.y); ctx.lineTo(fBR.x, fBR.y); ctx.lineTo(bBR.x, bBR.y); ctx.lineTo(bTR.x, bTR.y); ctx.fill(); }
            ctx.fillStyle = c.b; ctx.beginPath(); ctx.moveTo(bTL.x, bTL.y); ctx.lineTo(bTR.x, bTR.y); ctx.lineTo(bBR.x, bBR.y); ctx.lineTo(bBL.x, bBL.y); ctx.fill(); return { bTL, bTR, bBL, bBR }; 
        }

       // --- NEW FINISH LINE FUNCTION ---
        function drawFinishArch(z) {
            const roadWidth = 600; 
            const archHeight = 250;
            const pillarWidth = 40;
            const bannerDepth = 20;

            draw3DBox(-roadWidth/2 - pillarWidth/2, z, pillarWidth, archHeight, 40, {f:"#444", t:"#555", s:"#222", b:"#111"}, 0);
            draw3DBox(roadWidth/2 + pillarWidth/2, z, pillarWidth, archHeight, 40, {f:"#444", t:"#555", s:"#222", b:"#111"}, 0);

            let banner = draw3DBox(0, z, roadWidth + pillarWidth*2, 60, bannerDepth, {f:"#822", t:"#a33", s:"#611", b:"#b44"}, archHeight - 60);

            if (banner && banner.bTL) {

                    let boxSize = th/4;
                    for(let i=0; i<4; i++) {
                        ctx.fillRect(banner.bTL.x + (i%2*boxSize), banner.bTL.y + (Math.floor(i/2)*boxSize), boxSize, boxSize);
                        ctx.fillRect(banner.bTR.x - boxSize*2 + (i%2*boxSize), banner.bTL.y + (Math.floor(i/2)*boxSize), boxSize, boxSize);
                    }
                }
            }
        }

        // --- UPDATED RENDER QUEUE ---
        let q = traffic.filter(t => t.d > viewState.dist - 100 && t.d < viewState.dist + 3500).map(t => ({...t, isOpp: false}));
        clients.forEach(c => { if(!c.dead && c.dist > viewState.dist - 100 && c.dist < viewState.dist + 3500 && c.id !== window.spectatingId) q.push({d: c.dist, l: c.lane, type: 'player', col: COLORS[c.colIdx % COLORS.length], isOpp: true, name: c.name, brake: c.isBraking}); });
        if(!p1.dead) q.push({d: p1.dist, l: p1.lane, type: 'player', col: COLORS[p1.colIdx % COLORS.length], isOpp: false, isMe: true, brake: p1.isBraking}); 
        
        if (TOTAL_DIST > viewState.dist - 100 && TOTAL_DIST < viewState.dist + 3500) {

        }

        if (tData.hasBoost) {
            let ribSpacing = 200;
            for(let z = Math.floor(viewState.dist/ribSpacing)*ribSpacing; z < viewState.dist + 3500; z += ribSpacing) {
                if (z > viewState.dist) q.push({ d: z, l: 1, type: 'neon_rib' });
            }
            let padSpacing = 2000;
            for(let z = Math.floor(viewState.dist/padSpacing)*padSpacing; z < viewState.dist + 3500; z += padSpacing) {
                if (z > viewState.dist && z < TOTAL_DIST) q.push({ d: z, l: 1, type: 'boost_pad' });
            }
        }
        
        q.sort((a,b) => (b.d - a.d) || (b.l - a.l)).forEach(obj => {
            if (obj.type === 'finish_line') {
                drawFinishArch(TOTAL_DIST);

            }
            if (obj.type === 'neon_rib') {
                let c = {f: "#00f0ff", t: "#00aaff", s: "#004488", b: "#001122"}; 
                draw3DBox(-350, obj.d, 20, 400, 20, c, 0); draw3DBox(350, obj.d, 20, 400, 20, c, 0); draw3DBox(0, obj.d, 720, 20, 20, c, 380);  
                return;
            }
            if (obj.type === 'boost_pad') {

                }

                draw3DBox(worldX, obj.d + 15, dims.w*0.8, dims.hB*0.5, dims.lB*0.5, {f:"#444", t:"#555", s:"#333", b:"#222"}, currentY + dims.hB);

            }

                draw3DBox(worldX, obj.d, dims.w + pulse, dims.hB, dims.lB, obj.col, 0);
                return;

                draw3DBox(worldX, obj.d + V_DIMS.player.zOff, V_DIMS.player.w * 0.8, V_DIMS.player.hC, V_DIMS.player.lC, {f: "#fff", t: "#fff", s: "#fff", b: "#fff"}, V_DIMS.player.hB); // Glowing white top
                ctx.globalAlpha = 1.0;
                return;
            }

            if (backFace) {
                let tw = backFace.bTR.x - backFace.bTL.x, th = backFace.bBL.y - backFace.bTL.y; let glow = obj.brake ? 20 : 5;
                ctx.shadowBlur = glow; ctx.shadowColor = "red"; ctx.fillStyle = obj.brake ? "#ff0000" : "#aa0000";
                ctx.beginPath(); ctx.arc(backFace.bTL.x + tw*0.2, backFace.bTL.y + th*0.5, tw*(obj.brake?0.18:0.12), 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(backFace.bTR.x - tw*0.2, backFace.bTL.y + th*0.5, tw*(obj.brake?0.18:0.12), 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            }
            if (obj.isOpp && backFace) {
                let tagP = project(worldX, -(dims.hC + dims.hB + 50), obj.d);
                if (tagP && tagP.y > horizon) { ctx.fillStyle = "#fff"; ctx.font = Math.max(12 * tagP.s, 8) + "px 'Arial Black'"; ctx.textAlign = "center"; ctx.fillText(obj.name, tagP.x, tagP.y - (10*tagP.s)); ctx.fillStyle = "#00ffcc"; ctx.fillText("▼", tagP.x, tagP.y); }
            }
        });
        if(viewState.speed > 250) {
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = viewState.turbo ? 3 : 1; let cx = w/2, cy = horizon;
            for(let i=0; i < (viewState.turbo ? 40 : 20); i++) {
                let angle = Math.random() * Math.PI * 2; let dist = 60 + Math.random() * (h/2); let length = (viewState.speed/3) + Math.random()*100;
                let sx = cx + Math.cos(angle)*dist; let sy = cy + Math.sin(angle)*dist;
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + Math.cos(angle)*length, sy + Math.sin(angle)*length); ctx.stroke();
            }
        }

        // GLITCH UI WARNING
        if (p1.glitchInverted && Math.floor(performance.now() / 150) % 2 === 0) {
            ctx.fillStyle = "#ff00ff"; ctx.font = "bold 35px 'Arial Black'"; ctx.textAlign = "center";
            ctx.fillText("⚠️ SYSTEM GLITCH: CONTROLS INVERTED ⚠️", w/2, 120);
        }

        // VICTORY FLASH RENDERER
        if (window.flashOpacity > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${window.flashOpacity})`;
            ctx.fillRect(0, 0, w, h);
            window.flashOpacity -= 0.8 * (0.016);
            if (window.flashOpacity < 0) window.flashOpacity = 0;
        }

        ctx.restore();
    }
    function loop(t) { 
        if (lastTime === 0) lastTime = t; 
        let dt = (t - lastTime) / 1000; lastTime = t; 
        if (dt > 0.1) dt = 0.016; 
        
        if(window.gameState === 'RACE') update(dt); 
        if(window.gameState !== 'AUTH' && window.gameState !== 'MENU') draw();
        requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);

    function fireConfetti() {
        let duration = 3000; let end = Date.now() + duration;
        (function frame() {
            let drop = document.createElement('div'); drop.innerText = "🎉"; drop.style.position = 'fixed'; drop.style.left = Math.random() * 100 + 'vw'; drop.style.top = '-10px'; drop.style.fontSize = (Math.random() * 20 + 10) + 'px'; drop.style.zIndex = '200'; drop.style.transition = 'top 2s linear, transform 2s ease-in-out';
            document.body.appendChild(drop); setTimeout(() => { drop.style.top = '100vh'; drop.style.transform = `rotate(${Math.random()*360}deg)`; }, 50); setTimeout(() => drop.remove(), 2000);
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

    function showFinalResults(allRacers, reasonStr) {
        if(window.gameState === 'END') return; window.gameState = 'END'; window.showScreen('screen-gameover');
        document.getElementById('mobile-controls').classList.add('hidden'); document.getElementById('hud').classList.add('hidden'); document.getElementById('progress-bar').classList.add('hidden'); document.getElementById('spectator-ui').classList.add('hidden'); 
        let astWarn = document.getElementById('asteroid-warning'); if (astWarn) astWarn.classList.add('hidden');
        if (!allRacers || allRacers.length === 0) { document.getElementById('go-reason').innerText = reasonStr; return; }

        let myData = allRacers.find(r => r.id === myPeerId); let myRank = allRacers.findIndex(r => r.id === myPeerId) + 1;
        const title = document.getElementById('go-title'); const trophy = document.getElementById('trophy-container'); const rankDisplay = document.getElementById('go-rank');
        let isDeadLast = (myRank === allRacers.length && allRacers.length > 1);

        if (myData && myData.dead) { title.innerText = "YOU WRECKED!"; title.style.color = "#ff4444"; trophy.innerText = "💥"; trophy.style.textShadow = "0 0 20px rgba(255,0,0,0.8)"; } 
        else if (isDeadLast) { title.innerText = "YOU LOST!"; title.style.color = "#777"; trophy.innerText = "🐢"; trophy.style.textShadow = "none"; } 
        else { title.innerText = "FINISH!"; title.style.color = "#00ffcc"; if (myRank <= 3) { trophy.innerText = "🏆"; trophy.style.textShadow = "0 0 20px rgba(255,215,0,0.8)"; fireConfetti(); } else { trophy.innerText = "👍"; trophy.style.textShadow = "none"; } }

        document.getElementById('go-reason').innerText = reasonStr || "RACE CONCLUDED";
        if (isDeadLast) { rankDisplay.innerText = "DEAD LAST"; rankDisplay.style.color = "#888"; } else { rankDisplay.innerText = "YOUR RANK: " + myRank + " / " + allRacers.length; rankDisplay.style.color = "#FFD700"; }

        let tableHTML = `<table style="width:100%; text-align:left; border-collapse:collapse; font-size:1.2rem;"><tr style="border-bottom:2px solid #00ffcc; color:#00ffcc;"><th style="padding:10px 5px;">#</th><th>RACER</th><th>DISTANCE</th><th>STATUS</th></tr>`;
        allRacers.forEach((r, i) => { let status = r.dead ? "WRECKED" : "FINISHED"; let color = (r.id === myPeerId) ? "#FFD700" : (r.dead ? "#ff4444" : "#fff"); tableHTML += `<tr style="color:${color}; border-bottom:1px solid #444;"><td style="padding:10px 5px;">${i+1}</td><td>${r.name}</td><td>${Math.floor(r.dist)}m</td><td>${status}</td></tr>`; });
        tableHTML += `</table>`; document.getElementById('leaderboard-container').innerHTML = tableHTML;
    }

    window.addEventListener('beforeunload', () => { window.leaveLobby(); });
    window.leaveLobby = () => {
        if(hostPingInterval) clearInterval(hostPingInterval); if(clientPingInterval) clearInterval(clientPingInterval); if(autoStartInterval) clearInterval(autoStartInterval);
        if(window.countdownTimer) clearInterval(window.countdownTimer);
        if(hostConnToLobby) { try{ hostConnToLobby.close(); } catch(e) {} hostConnToLobby = null; }
        if(peer) { try{ peer.destroy(); } catch(e) {} peer = null; }
        clients = []; window.isHost = false; raceFinished = false; crossTriggered = false; window.spectatingId = null; ignitionLocked = false; p1.isReady = false; window.lobbyPlayers = [];
        lastTime = 0; window.gameState = 'MENU';
        window.showScreen('screen-menu'); document.getElementById('progress-bar').classList.add('hidden'); document.getElementById('spectator-ui').classList.add('hidden'); document.getElementById('asteroid-warning').classList.add('hidden');
  };

</script>
