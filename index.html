<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>10K Hyper-Drive - Warp Speed 3D</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Arial Black', sans-serif; }
        body { background-color: #000; color: white; overflow: hidden; touch-action: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; background: #000; }
        canvas { background: #87CEEB; height: 100%; width: 100%; max-width: 1400px; display: block; }
        
        #progress-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 60%; height: 12px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 6px; z-index: 5; }
        #p1-icon { position: absolute; top: -12px; color: #00ffcc; font-size: 1.5rem; transition: left 0.1s linear; text-shadow: 0 0 5px #000; }
        #p2-icon { position: absolute; top: -12px; color: #ff0055; font-size: 1.5rem; transition: left 0.1s linear; text-shadow: 0 0 5px #000; }

        /* FIX: HUD MOVED TO TOP LEFT */
        #hud { position: absolute; top: 50px; left: 20px; z-index: 5; text-shadow: 2px 2px 4px #000; font-size: 1.2rem; pointer-events: none; }
        .hud-label { font-size: 0.7rem; color: #ccc; letter-spacing: 2px; }
        #nitro-container { position: relative; width: 180px; height: 12px; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        #nitro-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00f0ff, #00ffcc); transition: width 0.1s; }
        #nitro-min-line { position: absolute; left: 25%; top: 0; height: 100%; width: 2px; background: rgba(255, 0, 0, 0.8); z-index: 2; }

        /* FULLSCREEN BUTTON */
        #fs-btn { position: absolute; top: 50px; right: 20px; z-index: 100; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100vw; display: flex; justify-content: space-between; padding: 0 30px; z-index: 20; pointer-events: none; }
        #mc-left, #mc-right { display: flex; gap: 20px; align-items: flex-end; }
        .touch-btn { pointer-events: auto; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); border-radius: 12px; color: #fff; display: flex; align-items: center; justify-content: center; touch-action: none; font-weight: bold; }
        .btn-steer { width: 70px; height: 70px; border-radius: 50%; font-size: 1.5rem; }
        #btn-gas { width: 90px; height: 90px; background: rgba(0, 255, 100, 0.2); border-color: #0f8; font-size: 1.2rem;}
        #btn-nitro { width: 80px; height: 70px; background: rgba(0, 240, 255, 0.2); border-color: #0ff; font-size: 0.9rem;}

        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 30; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        h1 { font-size: 3.5rem; text-transform: uppercase; margin-bottom: 1rem; text-shadow: 4px 4px 0 #000; text-align: center; }
        button { background: #fff; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin: 10px; color: #000; border-radius: 4px; }
        input { padding: 15px; font-size: 1.2rem; text-align: center; border: 4px solid #fff; background: #222; color: #fff; margin-bottom: 20px; border-radius: 4px; }
        
        #countdown-ui { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; z-index: 25; font-weight: bold; pointer-events: none; color: #fff; }
    </style>
</head>
<body>

    <div id="game-container"><canvas id="gameCanvas"></canvas></div>
    <div id="progress-container" class="hidden"><div id="p2-icon">▼</div><div id="p1-icon">▲</div></div>

    <div id="hud" class="hidden">
        <div><span class="hud-label">SPEED</span> <br><span id="hud-speed">0</span> KM/H</div>
        <div style="margin-top:5px;"><span class="hud-label">DISTANCE</span> <br><span id="hud-dist">0</span> M</div>
        <div id="nitro-container">
            <div id="nitro-fill"></div>
            <div id="nitro-min-line"></div>
        </div>
    </div>

    <button id="fs-btn" class="hidden" onclick="toggleFullscreen()">[ ] FULLSCREEN</button>

    <div id="mobile-controls" class="hidden">
        <div id="mc-left">
            <div id="btn-left" class="touch-btn btn-steer">◀</div>
            <div id="btn-right" class="touch-btn btn-steer">▶</div>
        </div>
        <div id="mc-right">
            <div id="btn-nitro" class="touch-btn">NITRO</div>
            <div id="btn-gas" class="touch-btn">GAS</div>
        </div>
    </div>

    <div id="countdown-ui" class="hidden"></div>

    <div id="screen-start" class="screen">
        <h1>WARP SPEED<br>3D</h1>
        <button onclick="showScreen('screen-menu')">START ENGINE</button>
    </div>

    <div id="screen-menu" class="screen hidden">
        <h2 style="font-size:2rem; margin-bottom: 20px;">MULTIPLAYER</h2>
        <button onclick="hostRoom()" style="background:#00ffcc;">HOST GAME</button>
        <input type="text" id="join-code" placeholder="ENTER CODE">
        <button onclick="joinRoom()" style="background:#ff0055; color:#fff;">JOIN GAME</button>
    </div>

    <div id="screen-lobby" class="screen hidden">
        <h2 id="lobby-code-display" style="font-size:2rem; color:#00ffcc;">ROOM: ---</h2>
        <div id="lobby-status" style="font-size:1.2rem; margin: 20px 0;">WAITING...</div>
        <button id="btn-ready" class="hidden" onclick="toggleReady()">READY UP</button>
        <button onclick="leaveLobby()" style="background:#ff4444; color:#fff;">BACK</button>
    </div>

    <div id="screen-gameover" class="screen hidden">
        <h1 id="go-title">RACE OVER</h1>
        <p id="go-reason" style="margin-bottom:2rem;"></p>
        <button onclick="location.reload()">RETRY</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TOTAL_DIST = 10000;
    const WORLD_SPEED_MULT = 4.0; 
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let peer, conn, isHost = false, gameState = 'START';
    let p1 = { lane: 1, camLane: 1, dist: 0, speed: 0, nitro: 100, turboActive: false, nitroLocked: false, ready: false, dead: false };
    let p2 = { lane: 1, dist: 0, ready: false, dead: false };
    let traffic = [], keys = {}, lastTime = 0, netTimer = 0, shake = 0;

    const V_DIMS = {
        player:  { w: 45, hB: 18, hC: 14, lB: 100, lC: 45, zOff: 25 },
        compact: { w: 40, hB: 16, hC: 15, lB: 85,  lC: 40, zOff: 20 },
        sedan:   { w: 48, hB: 18, hC: 14, lB: 110, lC: 50, zOff: 30 },
        suv:     { w: 55, hB: 28, hC: 22, lB: 125, lC: 60, zOff: 35 },
        truck:   { w: 65, hB: 45, hC: 30, lB: 280, lC: 50, zOff: 230 } 
    };

    const COLORS = [
        { f: "#b02", t: "#d03", s: "#801", b: "#e04" },
        { f: "#15b", t: "#26c", s: "#049", b: "#37d" },
        { f: "#182", t: "#293", s: "#061", b: "#3a4" },
        { f: "#aa1", t: "#bb2", s: "#880", b: "#cc3" },
        { f: "#ddd", t: "#eee", s: "#bbb", b: "#fff" },
        { f: "#333", t: "#444", s: "#111", b: "#555" } 
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); if(id) document.getElementById(id).classList.remove('hidden'); }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        } else {
            document.exitFullscreen();
        }
    }

    function bindTouch(btnId, keyCode) {
        const btn = document.getElementById(btnId);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyCode] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyCode] = false; });
    }
    bindTouch('btn-left', 'ArrowLeft');
    bindTouch('btn-right', 'ArrowRight');
    bindTouch('btn-gas', 'ArrowUp');
    bindTouch('btn-nitro', 'ShiftLeft');

    function hostRoom() { 
        const code = Math.random().toString(36).substring(2,7).toUpperCase(); 
        peer = new Peer(code); 
        peer.on('open', () => { isHost = true; showScreen('screen-lobby'); document.getElementById('lobby-code-display').innerText = "ROOM: " + code; }); 
        peer.on('connection', c => { conn = c; setupConn(); }); 
    }
    function joinRoom() { 
        const code = document.getElementById('join-code').value.toUpperCase(); if(!code) return; 
        peer = new Peer(); 
        peer.on('open', () => { conn = peer.connect(code); setupConn(); showScreen('screen-lobby'); }); 
    }
    function setupConn() {
        conn.on('open', () => { document.getElementById('lobby-status').innerText = "READY!"; document.getElementById('btn-ready').classList.remove('hidden'); });
        conn.on('data', data => {
            if(data.type === 'ready') { p2.ready = data.val; checkStart(); }
            if(data.type === 'traffic') traffic = data.val;
            if(data.type === 'sync') { p2.dist = data.dist; p2.lane = data.lane; if(data.dead) endGame("OPPONENT CRASHED!", true); }
        });
    }
    function toggleReady() { p1.ready = !p1.ready; conn.send({type: 'ready', val: p1.ready}); checkStart(); }

    function checkStart() {
        if(p1.ready && p2.ready) {
            if(isHost) {
                traffic = [];
                for (let d = 800; d < 9500; d += 400 + Math.random()*200) {
                    let type = Object.keys(V_DIMS)[Math.floor(Math.random()*5)];
                    traffic.push({ d: d, l: Math.floor(Math.random()*3), s: 70 + Math.random()*30, type: type, col: COLORS[Math.floor(Math.random()*6)] });
                }
                conn.send({type:'traffic', val: traffic});
            }
            startCountdown();
        }
    }

    function startCountdown() {
        showScreen(null); gameState = 'COUNTDOWN';
        const ui = document.getElementById('countdown-ui'); ui.classList.remove('hidden');
        document.getElementById('fs-btn').classList.remove('hidden');
        if(isTouchDevice) document.getElementById('mobile-controls').classList.remove('hidden');

        let count = 3; ui.innerText = count;
        let t = setInterval(() => { 
            count--; ui.innerText = count > 0 ? count : "GO!"; 
            if(count < 0) { 
                clearInterval(t); ui.classList.add('hidden'); 
                document.querySelectorAll('#hud, #progress-container').forEach(e => e.classList.remove('hidden')); 
                gameState = 'RACE'; lastTime = performance.now(); 
            } 
        }, 1000);
    }

    window.onkeydown = e => { keys[e.code] = true; };
    window.onkeyup = e => { keys[e.code] = false; };

    function update(dt) {
        if (shake > 0) shake -= dt * 10;
        if(keys['ArrowLeft']) p1.lane = Math.max(-0.2, p1.lane - 4.5 * dt);
        if(keys['ArrowRight']) p1.lane = Math.min(2.2, p1.lane + 4.5 * dt);
        p1.camLane += (p1.lane - p1.camLane) * 8 * dt; 

        if (p1.nitro < 25 && !p1.turboActive) p1.nitroLocked = true;
        if (p1.nitro >= 25) p1.nitroLocked = false;

        if (keys['ShiftLeft'] && p1.speed > 50 && !p1.nitroLocked && p1.nitro > 0) {
            p1.turboActive = true; p1.nitro -= 33 * dt; shake = Math.max(shake, 1.5);
        } else {
            p1.turboActive = false; if (p1.nitro < 100) p1.nitro += 15 * dt;
        }

        // FIX: AUTO-GAS ON TURBO FOR MOBILE
        let gasInput = keys['ArrowUp'] || (isTouchDevice && keys['ShiftLeft']);
        let target = gasInput ? (p1.turboActive ? 320 : 180) : 0;
        p1.speed = Math.min(target, p1.speed + (p1.speed < target ? 140 : 250) * dt);
        if (!gasInput && p1.speed > 0) p1.speed -= 100 * dt;

        let distGain = (p1.speed * 0.277 * WORLD_SPEED_MULT) * dt;
        if (p1.dist > 9500) distGain *= 2; 
        p1.dist += distGain;

        traffic.forEach(t => {
            t.d += (t.s - p1.speed) * 0.277 * WORLD_SPEED_MULT * dt;
            if(Math.abs(p1.dist - t.d) < 60 && Math.abs(p1.lane - t.l) < 0.4 && !p1.dead) {
                p1.dead = true; shake = 20; conn.send({type: 'sync', dead: true}); endGame("WRECKED!", false);
            }
        });

        if(p1.dist >= TOTAL_DIST) { conn.send({type: 'sync', dist: p1.dist}); endGame("VICTORY!", true); }

        netTimer += dt;
        if(netTimer > 0.1) { conn.send({type: 'sync', dist: p1.dist, lane: p1.lane}); netTimer = 0; }

        document.getElementById('hud-speed').innerText = Math.floor(p1.speed);
        document.getElementById('hud-dist').innerText = Math.floor(p1.dist);
        document.getElementById('nitro-fill').style.width = p1.nitro + "%";
        document.getElementById('p1-icon').style.left = Math.min((p1.dist/TOTAL_DIST*100), 100) + "%";
        document.getElementById('p2-icon').style.left = Math.min((p2.dist/TOTAL_DIST*100), 100) + "%";
    }

    function draw() {
        let w = canvas.width, h = canvas.height, horizon = h * 0.45;
        ctx.save();
        if (shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
        
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,w,horizon);
        ctx.fillStyle = "#2E8B57"; ctx.fillRect(0,horizon,w,h-horizon);

        function project(worldX, worldY, worldZ) {
            let dz = worldZ - p1.dist; if(dz < -50) return null;
            let scale = (p1.turboActive ? h*0.35 : h*0.55) / (dz + 180);
            return { x: w/2 + (worldX - (p1.camLane-1)*150)*scale, y: horizon + (worldY + 120)*scale, s: scale };
        }

        // Road
        let r1 = project(-300, 0, p1.dist-50), r2 = project(300, 0, p1.dist-50), r3 = project(300, 0, p1.dist+1800), r4 = project(-300, 0, p1.dist+1800);
        if(r1 && r3) { ctx.fillStyle = "#282b2e"; ctx.beginPath(); ctx.moveTo(r1.x, h); ctx.lineTo(r2.x, h); ctx.lineTo(r3.x, horizon); ctx.lineTo(r4.x, horizon); ctx.fill(); }

        // Finish Line
        if (TOTAL_DIST > p1.dist - 50 && TOTAL_DIST < p1.dist + 1800) {
            let f1 = project(-300, 0, TOTAL_DIST), f2 = project(300, 0, TOTAL_DIST);
            if(f1 && f2) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 20 * f1.s; ctx.beginPath(); ctx.moveTo(f1.x, f1.y); ctx.lineTo(f2.x, f2.y); ctx.stroke(); }
        }

        function drawBox(x, z, d, c, isPlayer) {
            let p = project(x, 0, z); if(!p || p.y < horizon) return;
            let sw = d.w * p.s, sh = d.hB * p.s;
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(p.x - sw/2, p.y - 5, sw, 10);
            ctx.fillStyle = c.f; ctx.fillRect(p.x - sw/2, p.y - sh, sw, sh);
            if(isPlayer && p1.turboActive) { ctx.shadowBlur = 20; ctx.shadowColor = "#0ff"; ctx.strokeStyle = "#0ff"; ctx.strokeRect(p.x - sw/2, p.y - sh, sw, sh); ctx.shadowBlur = 0; }
        }

        traffic.concat([{d: p2.dist, l: p2.lane, type: 'player', col: COLORS[1]}, {d: p1.dist, l: p1.lane, type: 'player', col: COLORS[0], isP: true}])
        .filter(obj => obj.d > p1.dist - 50 && obj.d < p1.dist + 1800)
        .sort((a,b) => b.d - a.d)
        .forEach(v => drawBox((v.l-1)*150, v.d, V_DIMS[v.type], v.col, v.isP));

        ctx.restore();
    }

    function loop(t) { 
        let dt = Math.min((t - lastTime)/1000, 0.1); lastTime = t; 
        if(gameState === 'RACE') update(dt); draw(); requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);

    function endGame(m, w) { 
        gameState = 'END'; showScreen('screen-gameover'); 
        document.getElementById('go-title').innerText = w ? "WINNER!" : "CRASHED!"; 
        document.getElementById('go-reason').innerText = m; 
    }
    function leaveLobby() { location.reload(); }
</script>
</body>
</html>
