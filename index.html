<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Warp Speed 3D - 10-Player Cloud Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDppG77Saed8i49ZzeTlgougqRfYwV0D4s",
            authDomain: "warpspeed3d-771b7.firebaseapp.com",
            projectId: "warpspeed3d-771b7",
            storageBucket: "warpspeed3d-771b7.firebasestorage.app",
            messagingSenderId: "468140398821",
            appId: "1:468140398821:web:3ef49e7332cbfd1fe9dc0c",
            measurementId: "G-JZTTZ5FSR7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        window.playerName = "";
        window.userUID = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.userUID = user.uid;
                if (user.isAnonymous) {
                    window.playerName = "GUEST_" + Math.floor(1000 + Math.random() * 9000);
                    updateHUDName();
                    window.showScreen('screen-menu');
                } else {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().username) {
                        window.playerName = userDoc.data().username;
                        updateHUDName();
                        window.showScreen('screen-menu');
                    } else {
                        window.showScreen('screen-username-gate');
                    }
                }
            } else {
                window.showScreen('screen-auth-main');
            }
        });

        window.claimUsername = async () => {
            const inputName = document.getElementById('gate-name-input').value.trim().toUpperCase();
            const errDiv = document.getElementById('gate-err');
            
            if (!/^[A-Z]+$/.test(inputName)) {
                errDiv.innerText = "LETTERS A-Z ONLY. NO NUMBERS OR SYMBOLS."; return;
            }
            if (inputName.length < 3 || inputName.length > 12) {
                errDiv.innerText = "NAME MUST BE 3-12 CHARACTERS"; return;
            }
            if (inputName.startsWith("GUEST")) {
                errDiv.innerText = "NAME CANNOT START WITH GUEST"; return;
            }
            
            errDiv.innerText = "CHECKING DATABASE...";
            try {
                await runTransaction(db, async (transaction) => {
                    const nameRef = doc(db, "usernames", inputName);
                    const nameDoc = await transaction.get(nameRef);
                    if (nameDoc.exists()) throw "NAME TAKEN. TRY ANOTHER.";
                    
                    const userRef = doc(db, "users", window.userUID);
                    transaction.set(nameRef, { uid: window.userUID });
                    transaction.set(userRef, { username: inputName, wins: 0, races: 0 });
                });
                window.playerName = inputName;
                updateHUDName();
                window.showScreen('screen-menu');
            } catch (e) {
                errDiv.innerText = e;
            }
        };

        window.isSearchingQuickRace = false;
        window.findQuickRace = async () => {
            if (window.isSearchingQuickRace) return;
            window.isSearchingQuickRace = true;

            const btn = document.querySelector('#screen-menu .btn-main');
            const originalText = btn.innerText;
            btn.innerText = "SEARCHING...";
            btn.disabled = true;

            try {
                const publicRef = doc(db, "matchmaking", "LATEST_PUBLIC");
                const snap = await getDoc(publicRef);
                
                if (snap.exists() && (Date.now() - snap.data().timestamp < 30000)) {
                    document.getElementById('join-code').value = snap.data().code;
                    document.getElementById('join-pass').value = "";
                    window.joinRoom();
                } else {
                    const newCode = Math.random().toString(36).substring(2,7).toUpperCase();
                    await setDoc(publicRef, { code: newCode, timestamp: Date.now() });
                    document.getElementById('host-pass').value = ""; 
                    window.hostRoom(newCode); 
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                window.isSearchingQuickRace = false;
            }
        };

        window.doGuest = () => signInAnonymously(auth);
        window.doGoogle = () => signInWithPopup(auth, googleProvider);
        window.doLogout = () => signOut(auth);

        function updateHUDName() {
            document.getElementById('hud-player-name').innerText = "RACER: " + window.playerName;
        }
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Arial Black', sans-serif; }
        body { background-color: #000; color: white; overflow: hidden; touch-action: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; background: #000; }
        canvas { background: #87CEEB; height: 100%; width: 100%; max-width: 1400px; display: block; }
        
        #hud-player-name { position: absolute; top: 20px; left: 20px; z-index: 40; font-size: 1.2rem; color: #00ffcc; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        #hud { position: absolute; top: 50px; left: 20px; z-index: 5; text-shadow: 2px 2px 4px #000; font-size: 1.8rem; pointer-events: none; }

        #nitro-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00f0ff, #00ffcc); transition: width 0.1s; }

        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 30; backdrop-filter: blur(8px); }
        .hidden { display: none !important; }
        
        h1 { font-size: 5rem; text-transform: uppercase; margin-bottom: 2rem; text-align: center; color: #fff; text-shadow: 4px 4px 0px #000; line-height: 1; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; transition: transform 0.1s; text-align: center; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.5rem; padding: 20px 40px;}
        .btn-alt { background: #ff0055; color: #fff; }
        .btn-guest { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid #ccc; font-size: 0.9rem; padding: 10px 20px; }
        
        input { padding: 15px; font-size: 1.2rem; text-align: center; border: 4px solid #fff; background: #222; color: #00ffcc; margin-bottom: 10px; border-radius: 4px; width: 300px; text-transform: uppercase;}
        
        #lobby-grid { width: 90%; max-width: 600px; background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 10px; padding: 20px; margin: 20px 0; max-height: 40vh; overflow-y: auto;}
        .lobby-slot { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #444; font-size: 1.2rem; }
        .slot-creator { color: #FFD700; font-weight: bold; }
        .btn-kick { background: #ff4444; color: #fff; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }

        #mobile-controls { position: absolute; bottom: 20px; left: 0; width: 100vw; display: flex; justify-content: space-between; padding: 0 20px; z-index: 20; pointer-events: none; }
        #mc-left { display: flex; gap: 10px; align-items: flex-end; }
        #mc-right { display: flex; gap: 10px; align-items: flex-end; position: relative;}
        .touch-btn { pointer-events: auto; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); border-radius: 12px; color: #fff; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; touch-action: none; font-weight: bold; }
        .touch-btn:active { background: rgba(255,255,255,0.4); }
        .btn-steer { width: 70px; height: 70px; border-radius: 50%; }
        #btn-gas { width: 85px; height: 85px; background: rgba(0, 255, 100, 0.2); border-color: #0f8; }
        #btn-brake { position: absolute; right: 0; bottom: 95px; width: 85px; height: 60px; background: rgba(255, 0, 0, 0.2); border-color: #f00; font-size: 1rem;}
        #btn-nitro { width: 75px; height: 65px; background: rgba(0, 240, 255, 0.2); border-color: #0ff; font-size: 1rem; margin-right: 85px;}

        #countdown-ui { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; z-index: 25; font-weight: bold; pointer-events: none; text-shadow: 8px 8px 0 rgba(0,0,0,0.5); color: #fff; }
    </style>
</head>
<body>

    <div id="screen-auth-main" class="screen hidden">
        <h1>WARP SPEED<br>3D</h1>
        <button class="btn btn-google" onclick="window.doGoogle()">
            <svg width="30" height="30" viewBox="0 0 24 24" style="margin-right:10px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            CONTINUE WITH GOOGLE
        </button>
        <button class="btn btn-guest" onclick="window.doGuest()">PLAY AS GUEST</button>

    <div id="screen-username-gate" class="screen hidden">
        <h2 style="font-size:2.5rem; margin-bottom: 20px;">CLAIM YOUR HANDLE</h2>
        <p style="margin-bottom:20px; color:#ccc;">This name will represent you in the 10-player hub.</p>
        <input type="text" id="gate-name-input" placeholder="UNIQUE USERNAME" maxlength="12">
        <button class="btn btn-main" onclick="window.claimUsername()">CLAIM HANDLE</button>

        <h2 id="lobby-code-display" style="font-size:3.5rem; color:#00ffcc;">ROOM: ---</h2>

        <div id="lobby-grid"></div>

        <button id="btn-start-race" class="btn btn-main hidden" onclick="window.hostStartRace()">START ENGINE</button>
        <button class="btn" style="background:#ff4444; color:#fff; margin-top:20px;" onclick="window.leaveLobby()">LEAVE LOBBY</button>

    <div id="screen-gameover" class="screen hidden">
        <div id="trophy-container" style="font-size: 6rem; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,215,0,0.8);">🏆</div>
        <h1 id="go-title">RACE OVER</h1>
        <h2 id="go-rank" style="font-size:2.5rem; color:#FFD700; margin-bottom:10px;"></h2>
        <p id="go-reason" style="font-size:1.5rem; margin-bottom:2rem; color:#ccc;"></p>
        <button class="btn btn-main" onclick="window.leaveLobby()">RETURN TO HUB</button>
    </div>

<script>
    window.toggleFS = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            document.getElementById('global-fs-btn').innerText = "✕ EXIT";
        } else {
            document.exitFullscreen();
            document.getElementById('global-fs-btn').innerText = "⛶ FULLSCREEN";
        }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TOTAL_DIST = 10000;
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let peer, isHost = false, roomCode = "", roomPass = "", myPeerId = "";
    let clients = []; 
    let hostConnToLobby = null; 
    let gameState = 'AUTH'; 
    let raceFinished = false; 
    let crossTriggered = false;
    
    let p1 = { lane: 1, camLane: 1, dist: 0, speed: 0, nitro: 100, turboActive: false, isBraking: false, dead: false, colIdx: 0 };
    let traffic = [], keys = {}, lastTime = 0, netTimer = 0;

    const COLORS = [
        { f: "#b02", t: "#d03", s: "#801", b: "#e04" }, 
        { f: "#15b", t: "#26c", s: "#049", b: "#37d" }, 
        { f: "#182", t: "#293", s: "#061", b: "#3a4" }, 
        { f: "#aa1", t: "#bb2", s: "#880", b: "#cc3" }, 
        { f: "#80d", t: "#91e", s: "#60b", b: "#a2f" }, 
        { f: "#d60", t: "#f80", s: "#a40", b: "#fa2" }, 
        { f: "#199", t: "#2aa", s: "#077", b: "#3bb" }, 
        { f: "#e17", t: "#f28", s: "#c05", b: "#f39" }, 
        { f: "#ddd", t: "#eee", s: "#bbb", b: "#fff" }, 
        { f: "#333", t: "#444", s: "#111", b: "#555" },  
        { f: "#f0f", t: "#f4f", s: "#a0a", b: "#f8f" }, 
        { f: "#0ff", t: "#4ff", s: "#0aa", b: "#8ff" }, 
        { f: "#0f0", t: "#4f4", s: "#0a0", b: "#8f8" }  
    ];

    const V_DIMS = {
        player:    { w: 45, hB: 18, hC: 14, lB: 100, lC: 45, zOff: 25 },
        speedster: { w: 35, hB: 14, hC: 10, lB: 90,  lC: 40, zOff: 20 },
        commuter:  { w: 45, hB: 18, hC: 15, lB: 100, lC: 45, zOff: 25 },
        tank:      { w: 70, hB: 40, hC: 25, lB: 140, lC: 70, zOff: 35 } 
    };

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    window.showScreen = function(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
        if(id) document.getElementById(id).classList.remove('hidden'); 
    };

    let gasBtnHeld = false;
    function bindTouch(btnId, keyCodes) {
        const btn = document.getElementById(btnId);
        btn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            keyCodes.forEach(k => keys[k] = true); 
            if(btnId === 'btn-gas') gasBtnHeld = true;
        });
        btn.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            keyCodes.forEach(k => keys[k] = false); 
            if(btnId === 'btn-gas') gasBtnHeld = false;
        });
        btn.addEventListener('touchcancel', (e) => { 
            e.preventDefault(); 
            keyCodes.forEach(k => keys[k] = false); 
            if(btnId === 'btn-gas') gasBtnHeld = false;
        });
    }
    bindTouch('btn-left', ['ArrowLeft', 'KeyA']);
    bindTouch('btn-right', ['ArrowRight', 'KeyD']);
    bindTouch('btn-gas', ['ArrowUp', 'KeyW']);
    bindTouch('btn-brake', ['ArrowDown', 'KeyS']);

    const nitroBtn = document.getElementById('btn-nitro');
    nitroBtn.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        keys['ShiftLeft'] = true; 
        keys['ArrowUp'] = true; 
    });
    nitroBtn.addEventListener('touchend', (e) => { 
        e.preventDefault(); 
        keys['ShiftLeft'] = false; 
        if (!gasBtnHeld) keys['ArrowUp'] = false; 
    });
    
    window.onkeydown = e => { keys[e.code] = true; };
    window.onkeyup = e => { keys[e.code] = false; };

    window.hostRoom = (overrideCode = null) => {
        roomPass = document.getElementById('host-pass').value.trim();
        roomCode = overrideCode || Math.random().toString(36).substring(2,7).toUpperCase();
        peer = new Peer(roomCode);
        
        peer.on('open', (id) => {
            isHost = true; myPeerId = id; clients = []; raceFinished = false;
            window.showScreen('screen-lobby');
            document.getElementById('lobby-code-display').innerText = "ROOM: " + roomCode;
            document.getElementById('lobby-status').innerText = roomPass ? "LOBBY SECURED WITH PASSWORD" : "WAITING FOR RACERS...";
            p1.colIdx = 0; 
            updateLobbyUI();
        });

        peer.on('connection', conn => {
            conn.on('data', data => {
                if (data.type === 'join_request') {
                    if (clients.length >= 9) { conn.send({type: 'rejected', msg: 'ROOM FULL'}); setTimeout(()=>conn.close(), 500); return; }
                    if (roomPass && data.pass !== roomPass) { conn.send({type: 'rejected', msg: 'INVALID PASSWORD'}); setTimeout(()=>conn.close(), 500); return; }
                    
                    clients.push({ conn: conn, id: conn.peer, name: data.name, dist: 0, lane: 1, speed: 0, dead: false, isBraking: false, colIdx: clients.length + 1 });
                    conn.send({type: 'accepted', colIdx: clients.length});
                    broadcastLobbyState();
                }
                if (data.type === 'sync' && gameState === 'RACE') {
                    let c = clients.find(c => c.id === conn.peer);
                    if (c) { c.dist = data.dist; c.lane = data.lane; c.speed = data.speed; c.dead = data.dead; c.isBraking = data.isBraking; }
                }
                if (data.type === 'crossed_finish_line') {
                    triggerGlobalFinish(); 
                }
            });
            conn.on('close', () => {
                clients = clients.filter(c => c.id !== conn.peer);
                if (gameState === 'LOBBY') broadcastLobbyState();
                checkRemainingPlayers();
            });
        });
    };

    window.joinRoom = () => {
        const joinBtn = document.getElementById('btn-join-room');
        if (joinBtn.disabled) return;
        joinBtn.disabled = true;
        joinBtn.innerText = "CONNECTING...";

        roomCode = document.getElementById('join-code').value.toUpperCase();
        roomPass = document.getElementById('join-pass').value;
        if (!roomCode) {
            joinBtn.disabled = false; joinBtn.innerText = "CONNECT"; return;
        }
        
        peer = new Peer();
        peer.on('open', (id) => {
            myPeerId = id; isHost = false; clients = []; raceFinished = false;
            hostConnToLobby = peer.connect(roomCode);
            
            hostConnToLobby.on('open', () => {
                hostConnToLobby.send({ type: 'join_request', name: window.playerName, pass: roomPass });
                joinBtn.disabled = false; joinBtn.innerText = "CONNECT";
            });
            
            hostConnToLobby.on('data', data => {
                if(data.type === 'rejected') { alert(data.msg); window.leaveLobby(); }
                if(data.type === 'accepted') { p1.colIdx = data.colIdx; window.showScreen('screen-lobby'); document.getElementById('lobby-code-display').innerText = "ROOM: " + roomCode; }
                if(data.type === 'kicked') { alert("REMOVED BY CREATOR"); window.leaveLobby(); }
                if(data.type === 'lobby_state') { clients = data.clients; updateLobbyUI(); }
                if(data.type === 'start_race') { traffic = data.traffic; startCountdown(); }
                if(data.type === 'game_sync') { clients = data.clients; traffic = data.traffic; checkRemainingPlayers(); }
                if(data.type === 'race_over') {
                    let myRank = data.rankings.findIndex(r => r.id === myPeerId) + 1;
                    endGame("RACE CONCLUDED!", true, myRank, data.rankings.length);
                }
            });
            
            hostConnToLobby.on('close', () => {
                if(gameState === 'RACE') endGame("HOST DISCONNECTED", true, 0, 0);
                else { alert("LOBBY CLOSED"); window.leaveLobby(); }
            });
        });

        peer.on('error', () => { joinBtn.disabled = false; joinBtn.innerText = "CONNECT"; });
    };

    function broadcastLobbyState() {
        if (!isHost) return;
        let safeClients = clients.map(c => ({ id: c.id, name: c.name, dist: c.dist, lane: c.lane, speed: c.speed, dead: c.dead, isBraking: c.isBraking, colIdx: c.colIdx }));
        clients.forEach(c => c.conn.send({ type: 'lobby_state', clients: safeClients }));
        updateLobbyUI();
    }

    window.kickPlayer = (peerId) => {
        let c = clients.find(c => c.id === peerId);
        if (c) { c.conn.send({type: 'kicked'}); setTimeout(()=>c.conn.close(), 500); }
        clients = clients.filter(c => c.id !== peerId);
        broadcastLobbyState();
    };

    function updateLobbyUI() {
        const grid = document.getElementById('lobby-grid');
        grid.innerHTML = "";
        
        let hostName = isHost ? window.playerName : (clients.length > 0 ? "HOST" : "---");
        if(!isHost && clients.length>0 && clients[0].isHostMark) hostName = clients[0].name; 
        
        grid.innerHTML += `<div class="lobby-slot"><span class="slot-creator">1. ${isHost ? window.playerName : "CREATOR"} (CREATOR)</span></div>`;
        
        let displayList = isHost ? clients : clients;
        for (let i = 0; i < 9; i++) {
            if (i < displayList.length) {
                let c = displayList[i];
                let kickBtn = isHost ? `<button class="btn-kick" onclick="window.kickPlayer('${c.id}')">KICK</button>` : '';
                grid.innerHTML += `<div class="lobby-slot"><span>${i+2}. ${c.name}</span> ${kickBtn}</div>`;
            } else {
                grid.innerHTML += `<div class="lobby-slot" style="color:#666;"><span>${i+2}. [ EMPTY SLOT ]</span></div>`;
            }
        }

        const startBtn = document.getElementById('btn-start-race');
        if (isHost && clients.length > 0) {
            startBtn.classList.remove('hidden');
        } else {
            startBtn.classList.add('hidden');
        }
    }

    window.hostStartRace = () => {
        if (!isHost || clients.length === 0) return;
        traffic = [];
        let types = ['speedster', 'commuter', 'tank'];
        let lastZ = [0, 0, 0]; 

        for (let d = 800; d < 9500; d += 250) {
            let safeLane = Math.floor(d / 500) % 3; 
            for (let lane = 0; lane < 3; lane++) {
                if (lane === safeLane) continue; 
                
                if (Math.random() < 0.4) {
                    if (d - lastZ[lane] > 300) { 
                        let type = types[Math.floor(Math.random()*types.length)];
                        let baseSpeed = type === 'speedster' ? 120 + Math.random()*20 : (type === 'tank' ? 50 + Math.random()*10 : 80 + Math.random()*20);
                        
                        traffic.push({ 
                            d: d, l: lane, s: baseSpeed, type: type, 
                            col: COLORS[Math.floor(Math.random() * COLORS.length)] 
                        });
                        lastZ[lane] = d;
                    }
                }
            }
        }
        
        clients.forEach(c => c.conn.send({ type: 'start_race', traffic: traffic }));
        startCountdown();
    };

    function startCountdown() {
        window.showScreen(null); gameState = 'COUNTDOWN';
        const ui = document.getElementById('countdown-ui'); ui.classList.remove('hidden');
        if(isTouchDevice) document.getElementById('mobile-controls').classList.remove('hidden');

        p1.dist = 0; p1.speed = 0; p1.nitro = 100; p1.lane = 1; p1.camLane = 1; p1.dead = false; raceFinished = false; crossTriggered = false;
        let count = 3; ui.innerText = count;
        let t = setInterval(() => { 
            count--; 
            ui.innerText = count > 0 ? count : "GO!"; 
            if(count < 0) { 
                clearInterval(t); ui.classList.add('hidden'); 
                document.getElementById('hud').classList.remove('hidden');
                gameState = 'RACE'; lastTime = performance.now(); 
            } 
        }, 1000);
    }

    function triggerGlobalFinish() {
        if (raceFinished) return;
        raceFinished = true;
        
        let allRacers = clients.map(c => ({id: c.id, name: c.name, dist: c.dist}));
        allRacers.push({id: myPeerId, name: window.playerName, dist: p1.dist});
        allRacers.sort((a, b) => b.dist - a.dist); 
        
        clients.forEach(c => c.conn.send({ type: 'race_over', rankings: allRacers }));
        
        let myRank = allRacers.findIndex(r => r.id === myPeerId) + 1;
        endGame("RACE CONCLUDED!", true, myRank, allRacers.length);
    }

    function update(dt) {
        let steerSpeed = 4.5; 
        if(keys['KeyA'] || keys['ArrowLeft']) p1.lane -= steerSpeed * dt;
        if(keys['KeyD'] || keys['ArrowRight']) p1.lane += steerSpeed * dt;
        p1.lane = Math.max(-0.2, Math.min(2.2, p1.lane)); 
        p1.camLane += (p1.lane - p1.camLane) * 8 * dt; 

        p1.isBraking = keys['KeyS'] || keys['ArrowDown'];
        let gasPressed = keys['KeyW'] || keys['ArrowUp'];
        
        if (keys['ShiftLeft'] && p1.speed > 80 && p1.nitro > 0) {
            p1.turboActive = true; p1.nitro -= 33 * dt;
        } else {
            p1.turboActive = false;
            if (p1.nitro < 100) p1.nitro += 15 * dt;
        }

        if (p1.isBraking) {
            p1.speed = Math.max(0, p1.speed - 400 * dt); 
        } else if (gasPressed) {
            let targetSpeed = p1.turboActive ? 320 : 180;
            p1.speed = Math.min(targetSpeed, p1.speed + 150 * dt);
        } else {
            p1.speed = Math.max(0, p1.speed - 40 * dt); 
        }

        p1.dist += (p1.speed * 0.277 * 4.0) * dt; 

        traffic.forEach(t => {
            if(isHost) {
                t.d += ((t.s * 0.277 * 4.0) * dt); 
                let carAhead = traffic.find(other => other.l === t.l && other.d > t.d && (other.d - t.d) < 200);
                if (carAhead && t.s > carAhead.s) t.s = carAhead.s; 
            }
            let lBound = V_DIMS[t.type].lB;
            if(Math.abs(p1.dist - t.d) < (lBound * 0.6) && Math.abs(p1.lane - t.l) < 0.40 && !p1.dead) {
                p1.dead = true;
                if(!isHost) hostConnToLobby.send({type: 'sync', dist: p1.dist, lane: p1.lane, speed: 0, dead: true, isBraking: false});
                endGame("WRECKED!", false, 0, 0);
            }
        });

        if(p1.dist >= TOTAL_DIST && !p1.dead && !crossTriggered) {
            crossTriggered = true;
            p1.speed = 0; 
            p1.dist = TOTAL_DIST;
            if (isHost) {
                triggerGlobalFinish();
            } else {
                hostConnToLobby.send({type: 'crossed_finish_line'});
                endGame("CROSSED THE LINE! WAITING FOR OTHERS...", true, 1, 1); 
            }
        }

        netTimer += dt;
        if(netTimer > 0.05) {
            if(isHost) {
                let safeClients = clients.map(c => ({ id: c.id, name: c.name, dist: c.dist, lane: c.lane, speed: c.speed, dead: c.dead, isBraking: c.isBraking, colIdx: c.colIdx }));
                safeClients.push({ id: myPeerId, name: window.playerName, dist: p1.dist, lane: p1.lane, speed: p1.speed, dead: p1.dead, isBraking: p1.isBraking, colIdx: p1.colIdx }); 
                clients.forEach(c => c.conn.send({type: 'game_sync', clients: safeClients, traffic: traffic}));
            } else {
                hostConnToLobby.send({type: 'sync', dist: p1.dist, lane: p1.lane, speed: p1.speed, dead: p1.dead, isBraking: p1.isBraking});
            }
            netTimer = 0;
        }

        document.getElementById('hud-speed').innerText = Math.floor(p1.speed);
        document.getElementById('hud-dist').innerText = Math.floor(p1.dist);
        document.getElementById('nitro-fill').style.width = p1.nitro + "%";
    }

    function checkRemainingPlayers() {
        if(gameState !== 'RACE' || raceFinished) return;
        let aliveOthers = clients.filter(c => c.id !== myPeerId && !c.dead);
        if(aliveOthers.length === 0 && clients.length > 0) {
            triggerGlobalFinish();
        }
    }

    function draw() {
        let w = canvas.width, h = canvas.height;
        ctx.save();

        let horizon = h * 0.45;
        let skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
        skyGrad.addColorStop(0, "#0a0a2a"); skyGrad.addColorStop(1, "#3a1c71"); 
        ctx.fillStyle = skyGrad; ctx.fillRect(0,0,w,h);
        
        ctx.fillStyle = "#111"; ctx.fillRect(0, horizon, w, h-horizon); 

        let focalLength = p1.turboActive ? h * 0.35 : h * 0.55; 

        function project(worldX, worldY, worldZ) {
            let dz = worldZ - p1.dist;
            if(dz < -50) return null; 
            let scale = focalLength / (dz + 180); 
            let camX = (p1.camLane - 1) * 150; 
            return { x: w/2 + (worldX - camX)*scale, y: horizon + (worldY + 120)*scale, s: scale };
        }

        let r1 = project(-300, 0, p1.dist - 50); let r2 = project(300, 0, p1.dist - 50);
        let r3 = project(300, 0, p1.dist + 1800); let r4 = project(-300, 0, p1.dist + 1800);
        if(r1 && r3) {
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.moveTo(r1.x, h); ctx.lineTo(r2.x, h); ctx.lineTo(r3.x, horizon); ctx.lineTo(r4.x, horizon); ctx.fill();
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(r1.x, h); ctx.lineTo(r4.x, horizon); ctx.stroke(); ctx.beginPath(); ctx.moveTo(r2.x, h); ctx.lineTo(r3.x, horizon); ctx.stroke();
        }

        let totalCycle = 40; 
        ctx.fillStyle = "#fff";
        for(let z = Math.floor(p1.dist/totalCycle)*totalCycle; z < p1.dist + 1800; z += totalCycle) {
            let pL1 = project(-100, 0, z); let pL2 = project(-100, 0, z + 20);
            let pR1 = project(100, 0, z); let pR2 = project(100, 0, z + 20);
            if (pL1 && pL2 && pL1.y > horizon) {
                ctx.beginPath(); ctx.moveTo(pL1.x - 2*pL1.s, pL1.y); ctx.lineTo(pL1.x + 2*pL1.s, pL1.y); ctx.lineTo(pL2.x + 2*pL2.s, pL2.y); ctx.lineTo(pL2.x - 2*pL2.s, pL2.y); ctx.fill();
            }
            if (pR1 && pR2 && pR1.y > horizon) {
                ctx.beginPath(); ctx.moveTo(pR1.x - 2*pR1.s, pR1.y); ctx.lineTo(pR1.x + 2*pR1.s, pR1.y); ctx.lineTo(pR2.x + 2*pR2.s, pR2.y); ctx.lineTo(pR2.x - 2*pR2.s, pR2.y); ctx.fill();
            }
        }

        function draw3DBox(worldX, worldZ, wSize, hSize, lSize, c, yOff) {
            let fTL = project(worldX - wSize/2, -(hSize + yOff), worldZ + lSize); let fTR = project(worldX + wSize/2, -(hSize + yOff), worldZ + lSize);
            let fBL = project(worldX - wSize/2, -yOff, worldZ + lSize); let fBR = project(worldX + wSize/2, -yOff, worldZ + lSize);
            let bTL = project(worldX - wSize/2, -(hSize + yOff), worldZ); let bTR = project(worldX + wSize/2, -(hSize + yOff), worldZ);
            let bBL = project(worldX - wSize/2, -yOff, worldZ); let bBR = project(worldX + wSize/2, -yOff, worldZ);
            if(!fTL || !bTL) return;

            ctx.fillStyle = c.f; ctx.beginPath(); ctx.moveTo(fTL.x, fTL.y); ctx.lineTo(fTR.x, fTR.y); ctx.lineTo(fBR.x, fBR.y); ctx.lineTo(fBL.x, fBL.y); ctx.fill();
            ctx.fillStyle = c.t; ctx.beginPath(); ctx.moveTo(fTL.x, fTL.y); ctx.lineTo(fTR.x, fTR.y); ctx.lineTo(bTR.x, bTR.y); ctx.lineTo(bTL.x, bTL.y); ctx.fill();
            
            let camX = (p1.camLane - 1) * 150;
            ctx.fillStyle = c.s;
            if (worldX > camX) { 
                ctx.beginPath(); ctx.moveTo(fTL.x, fTL.y); ctx.lineTo(fBL.x, fBL.y); ctx.lineTo(bBL.x, bBL.y); ctx.lineTo(bTL.x, bTL.y); ctx.fill();
            } else { 
                ctx.beginPath(); ctx.moveTo(fTR.x, fTR.y); ctx.lineTo(fBR.x, fBR.y); ctx.lineTo(bBR.x, bBR.y); ctx.lineTo(bTR.x, bTR.y); ctx.fill();
            }
            ctx.fillStyle = c.b; ctx.beginPath(); ctx.moveTo(bTL.x, bTL.y); ctx.lineTo(bTR.x, bTR.y); ctx.lineTo(bBR.x, bBR.y); ctx.lineTo(bBL.x, bBL.y); ctx.fill();

            return { bTL, bTR, bBL, bBR }; 
        }

        let q = traffic.filter(t => t.d > p1.dist - 100 && t.d < p1.dist + 1800).map(t => ({...t, isOpp: false}));
        
        clients.forEach(c => {
            if(c.id !== myPeerId && !c.dead && c.dist > p1.dist - 100 && c.dist < p1.dist + 1800) {
                q.push({d: c.dist, l: c.lane, type: 'player', col: COLORS[c.colIdx % COLORS.length], isOpp: true, name: c.name, brake: c.isBraking});
            }
        });
        
        if(!p1.dead) q.push({d: p1.dist, l: p1.lane, type: 'player', col: COLORS[p1.colIdx % COLORS.length], isOpp: false, isMe: true, brake: p1.isBraking}); 
        
        q.sort((a,b) => b.d - a.d).forEach(obj => {
            let worldX = (obj.l - 1) * 150;
            let dims = V_DIMS[obj.type];
            let backFace = draw3DBox(worldX, obj.d, dims.w, dims.hB, dims.lB, obj.col, 0);
            draw3DBox(worldX, obj.d + dims.zOff, dims.w * 0.8, dims.hC, dims.lC, {f: "#111", t: "#222", s: "#0a0a0a", b: "#151515"}, dims.hB);

            if (backFace) {
                let tw = backFace.bTR.x - backFace.bTL.x, th = backFace.bBL.y - backFace.bTL.y;
                let isBraking = obj.brake;
                let glow = isBraking ? 20 : 5;
                ctx.shadowBlur = glow; ctx.shadowColor = "red";
                ctx.fillStyle = isBraking ? "#ff0000" : "#aa0000";
                
                ctx.beginPath(); ctx.arc(backFace.bTL.x + tw*0.2, backFace.bTL.y + th*0.5, tw*(isBraking?0.18:0.12), 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(backFace.bTR.x - tw*0.2, backFace.bTL.y + th*0.5, tw*(isBraking?0.18:0.12), 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            if (obj.isOpp && backFace) {
                let tagP = project(worldX, -(dims.hC + dims.hB + 50), obj.d);
                if (tagP && tagP.y > horizon) {
                    ctx.fillStyle = "#fff";
                    ctx.font = Math.max(12 * tagP.s, 8) + "px 'Arial Black'";
                    ctx.textAlign = "center";
                    ctx.fillText(obj.name, tagP.x, tagP.y - (10*tagP.s));
                    ctx.fillStyle = "#00ffcc";
                    ctx.fillText("▼", tagP.x, tagP.y);
                }
            }
        });

        if(p1.speed > 160) {
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = p1.turboActive ? 3 : 1;
            let cx = w/2, cy = horizon;
            for(let i=0; i < (p1.turboActive ? 30 : 15); i++) {
                let angle = Math.random() * Math.PI * 2;
                let dist = 60 + Math.random() * (h/2); 
                let length = (p1.speed/3) + Math.random()*80;
                let sx = cx + Math.cos(angle)*dist;
                let sy = cy + Math.sin(angle)*dist;
                ctx.beginPath(); ctx.moveTo(sx, sy); 
                ctx.lineTo(sx + Math.cos(angle)*length, sy + Math.sin(angle)*length); 
                ctx.stroke();
            }
        }
        ctx.restore();
    }

    function loop(t) { 
        let dt = (t - lastTime) / 1000; 
        if(!lastTime) dt = 0; 
        lastTime = t; 
        if (dt > 0.1) dt = 0.016;

        if(gameState === 'RACE') { update(dt); }
        if(gameState !== 'AUTH' && gameState !== 'MENU') { draw(); }
        requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);

    function fireConfetti() {
        let duration = 3000;
        let end = Date.now() + duration;
        (function frame() {
            let drop = document.createElement('div');
            drop.innerText = "🎉";
            drop.style.position = 'fixed';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.top = '-10px';
            drop.style.fontSize = (Math.random() * 20 + 10) + 'px';
            drop.style.zIndex = '200';
            drop.style.transition = 'top 2s linear, transform 2s ease-in-out';
            document.body.appendChild(drop);
            
            setTimeout(() => { 
                drop.style.top = '100vh'; 
                drop.style.transform = `rotate(${Math.random()*360}deg)`; 
            }, 50);
            setTimeout(() => drop.remove(), 2000);

            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

    window.endGame = function(msg, win, rank = 0, totalPlayers = 0) {
        if(gameState === 'END') return;
        gameState = 'END';
        window.showScreen('screen-gameover');
        document.getElementById('mobile-controls').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden'); 
        
        const title = document.getElementById('go-title');
        const rankText = document.getElementById('go-rank');
        const trophy = document.getElementById('trophy-container');
        
        document.getElementById('go-reason').innerText = msg;
        rankText.innerText = "";
        trophy.innerText = "";

        if (!win) {
            title.innerText = "YOU WRECKED!"; 
            title.style.color = "#ff4444";
            rankText.innerText = "DNF (DID NOT FINISH)";
            trophy.innerText = "💥";
            trophy.style.textShadow = "0 0 20px rgba(255,0,0,0.8)";
        } else if (rank > 0) {
            title.innerText = "FINISH!";
            title.style.color = "#00ffcc";
            
            let suffix = "TH";
            if (rank === 1) suffix = "ST";
            else if (rank === 2) suffix = "ND";
            else if (rank === 3) suffix = "RD";
            
            rankText.innerText = `${rank}${suffix} PLACE`;

            if (rank === totalPlayers && totalPlayers > 1) {
                title.innerText = "DEAD LAST.";
                title.style.color = "#555";
                rankText.style.color = "#888";
                trophy.innerText = "🐢";
                trophy.style.textShadow = "none";
            } else if (rank <= 3) {
                trophy.innerText = "🏆";
                trophy.style.textShadow = "0 0 20px rgba(255,215,0,0.8)";
                fireConfetti();
            } else {
                trophy.innerText = "👍";
                trophy.style.textShadow = "none";
            }
        }
    };

    window.leaveLobby = () => {
        if(hostConnToLobby) { try{ hostConnToLobby.close(); } catch(e) {} hostConnToLobby = null; }
        if(peer) { try{ peer.destroy(); } catch(e) {} peer = null; }
        clients = []; isHost = false; raceFinished = false; crossTriggered = false;
        window.showScreen('screen-menu');
        gameState = 'MENU';
    };
    
    window.addEventListener('beforeunload', window.leaveLobby);
</script>
